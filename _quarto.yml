format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 2
    code-fold: false
    code-tools: true
    code-copy: true
    code-link: true
    highlight-style: github
    fig-cap-location: bottom
    tbl-cap-location: top
    smooth-scroll: true
    anchor-sections: true
    citations-hover: true
    footnotes-hover: true
  pdf:
    documentclass: scrbook
    toc: true
    number-sections: true
    code-fold: false
    highlight-style: github

execute:
  echo: true
  warning: false
  message: false
  freeze: auto

editor: source
