  author: "Public Health Data Science Program"
  date: today
  search: true
  repo-url: https://github.com/your-org/R-PBL
  downloads: [pdf]
  sidebar:
    style: floating
    collapse-level: 2
    pinned: true
  page-footer:
    left: "R for Public Health — a Problem-Based Learning course built with Quarto."
    right: "Every lesson starts with a real problem, not a syntax lecture."

